# ==========================================================================
#  Dismai (万花筒) - Full Stack Docker Compose
#  Usage:
#    docker compose up -d                     # Start everything
#    docker compose up -d mysql redis nacos   # Start selected infra
#    docker compose down -v                   # Tear down with volumes
# ==========================================================================

x-common-env: &common-env
  NACOS_HOST: nacos
  NACOS_PORT: 8848
  REDIS_HOST: redis
  REDIS_PORT: 6379
  MYSQL_HOST: mysql
  MYSQL_PORT: 3306
  MYSQL_USER: root
  MYSQL_PASSWORD: root
  KAFKA_HOST: kafka
  KAFKA_PORT: 9092
  ES_HOST: elasticsearch
  ES_PORT: 9200
  SENTINEL_HOST: sentinel
  SENTINEL_PORT: 8858
  TZ: Asia/Shanghai

x-service-base: &service-base
  build:
    context: .
    dockerfile: Dockerfile
  restart: unless-stopped
  networks:
    - dismai-network
  environment:
    <<: *common-env
    SPRING_PROFILES_ACTIVE: local
    # Override hardcoded 127.0.0.1 in application.yml
    SPRING_CLOUD_NACOS_DISCOVERY_SERVERADDR: nacos:8848
    SPRING_CLOUD_NACOS_CONFIG_SERVERADDR: nacos:8848
    SPRING_DATA_REDIS_HOST: redis
    SPRING_DATA_REDIS_PORT: 6379

services:
  # ========================================================================
  # INFRASTRUCTURE
  # ========================================================================

  mysql:
    image: mysql:8.0
    container_name: dismai-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      TZ: Asia/Shanghai
    volumes:
      - mysql-data:/var/lib/mysql
      - ./sql/cloud:/docker-entrypoint-initdb.d/sql:ro
      - ./docker/mysql/init-databases.sh:/docker-entrypoint-initdb.d/00-init-databases.sh:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --max-connections=500
      --innodb-buffer-pool-size=256M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - dismai-network

  redis:
    image: redis:7-alpine
    container_name: dismai-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - dismai-network

  nacos:
    image: nacos/nacos-server:v2.3.0
    container_name: dismai-nacos
    restart: unless-stopped
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "false"
      JVM_XMS: 256m
      JVM_XMX: 256m
      TZ: Asia/Shanghai
    volumes:
      - nacos-data:/home/nacos/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/v1/console/health/readiness"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - dismai-network

  kafka:
    image: apache/kafka:3.7.0
    container_name: dismai-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      TZ: Asia/Shanghai
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - dismai-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: dismai-elasticsearch
    restart: unless-stopped
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms256m -Xmx256m"
      TZ: Asia/Shanghai
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s
    networks:
      - dismai-network

  sentinel:
    image: bladex/sentinel-dashboard:1.8.7
    container_name: dismai-sentinel
    restart: unless-stopped
    ports:
      - "8082:8858"
    environment:
      TZ: Asia/Shanghai
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8858/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - dismai-network

  # ========================================================================
  # APPLICATION SERVICES
  # ========================================================================

  gateway:
    <<: *service-base
    container_name: dismai-gateway
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: gateway
        SERVICE_PORT: 6085
    ports:
      - "6085:6085"
    environment:
      <<: *common-env
      SPRING_PROFILES_ACTIVE: local,pro
      SPRING_CLOUD_NACOS_DISCOVERY_SERVERADDR: nacos:8848
      SPRING_CLOUD_NACOS_CONFIG_SERVERADDR: nacos:8848
      SPRING_DATA_REDIS_HOST: redis
      SPRING_KAFKA_BOOTSTRAPSERVERS: kafka:9092
      SPRING_CLOUD_SENTINEL_TRANSPORT_DASHBOARD: sentinel:8858
      JAVA_OPTS: "-Xms256m -Xmx256m"
    depends_on:
      nacos:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  user:
    <<: *service-base
    container_name: dismai-user
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: user
        SERVICE_PORT: 6082
    ports:
      - "6082:6082"
    environment:
      <<: *common-env
      SPRING_PROFILES_ACTIVE: local
      SPRING_CLOUD_NACOS_DISCOVERY_SERVERADDR: nacos:8848
      SPRING_CLOUD_NACOS_CONFIG_SERVERADDR: nacos:8848
      SPRING_DATA_REDIS_HOST: redis
      SHARDING_CONFIG_NAME: shardingsphere-user-local.yaml
      JAVA_OPTS: "-Xms256m -Xmx256m"
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy
      redis:
        condition: service_healthy

  program:
    <<: *service-base
    container_name: dismai-program
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: program
        SERVICE_PORT: 6086
    ports:
      - "6086:6086"
    environment:
      <<: *common-env
      SPRING_PROFILES_ACTIVE: local
      SPRING_CLOUD_NACOS_DISCOVERY_SERVERADDR: nacos:8848
      SPRING_CLOUD_NACOS_CONFIG_SERVERADDR: nacos:8848
      SPRING_DATA_REDIS_HOST: redis
      SPRING_KAFKA_BOOTSTRAPSERVERS: kafka:9092
      SPRING_ELASTICSEARCH_URIS: http://elasticsearch:9200
      ELASTICSEARCH_IP: elasticsearch:9200
      ELASTICSEARCH_USERNAME: elastic
      ELASTICSEARCH_PASSWORD: elastic
      SHARDING_CONFIG_NAME: shardingsphere-program-local.yaml
      JAVA_OPTS: "-Xms256m -Xmx512m"
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  order:
    <<: *service-base
    container_name: dismai-order
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: order
        SERVICE_PORT: 8081
    ports:
      - "8081:8081"
    environment:
      <<: *common-env
      SPRING_PROFILES_ACTIVE: local
      SPRING_CLOUD_NACOS_DISCOVERY_SERVERADDR: nacos:8848
      SPRING_CLOUD_NACOS_CONFIG_SERVERADDR: nacos:8848
      SPRING_DATA_REDIS_HOST: redis
      SPRING_KAFKA_BOOTSTRAPSERVERS: kafka:9092
      SHARDING_CONFIG_NAME: shardingsphere-order-local.yaml
      JAVA_OPTS: "-Xms256m -Xmx256m"
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy

  pay:
    <<: *service-base
    container_name: dismai-pay
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: pay
        SERVICE_PORT: 6087
    ports:
      - "6087:6087"
    environment:
      <<: *common-env
      SPRING_PROFILES_ACTIVE: local
      SPRING_CLOUD_NACOS_DISCOVERY_SERVERADDR: nacos:8848
      SPRING_CLOUD_NACOS_CONFIG_SERVERADDR: nacos:8848
      SPRING_DATA_REDIS_HOST: redis
      SHARDING_CONFIG_NAME: shardingsphere-pay-local.yaml
      JAVA_OPTS: "-Xms256m -Xmx256m"
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy
      redis:
        condition: service_healthy

  base-data:
    <<: *service-base
    container_name: dismai-base-data
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: base-data
        SERVICE_PORT: 6083
    ports:
      - "6083:6083"
    environment:
      <<: *common-env
      SPRING_PROFILES_ACTIVE: local
      SPRING_CLOUD_NACOS_DISCOVERY_SERVERADDR: nacos:8848
      SPRING_CLOUD_NACOS_CONFIG_SERVERADDR: nacos:8848
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/dismai_base_data?useUnicode=true&characterEncoding=UTF-8&rewriteBatchedStatements=true&allowMultiQueries=true&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      JAVA_OPTS: "-Xms256m -Xmx256m"
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy
      redis:
        condition: service_healthy

  customize:
    <<: *service-base
    container_name: dismai-customize
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: customize
        SERVICE_PORT: 6084
    ports:
      - "6084:6084"
    environment:
      <<: *common-env
      SPRING_PROFILES_ACTIVE: local
      SPRING_CLOUD_NACOS_DISCOVERY_SERVERADDR: nacos:8848
      SPRING_CLOUD_NACOS_CONFIG_SERVERADDR: nacos:8848
      SPRING_DATA_REDIS_HOST: redis
      SPRING_KAFKA_BOOTSTRAPSERVERS: kafka:9092
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/dismai_customize?useUnicode=true&characterEncoding=UTF-8&rewriteBatchedStatements=true&allowMultiQueries=true&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      JAVA_OPTS: "-Xms256m -Xmx256m"
    depends_on:
      mysql:
        condition: service_healthy
      nacos:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy

  admin:
    <<: *service-base
    container_name: dismai-admin
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: admin
        SERVICE_PORT: 10082
    ports:
      - "10082:10082"
    environment:
      <<: *common-env
      SPRING_CLOUD_NACOS_DISCOVERY_SERVERADDR: nacos:8848
      SPRING_CLOUD_NACOS_CONFIG_SERVERADDR: nacos:8848
      JAVA_OPTS: "-Xms128m -Xmx128m"
    depends_on:
      nacos:
        condition: service_healthy

  # ========================================================================
  # FRONTEND
  # ========================================================================

  frontend:
    build:
      context: ./vue3
      dockerfile: Dockerfile
    container_name: dismai-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - gateway
    networks:
      - dismai-network

# ========================================================================
# VOLUMES & NETWORKS
# ========================================================================

volumes:
  mysql-data:
  redis-data:
  nacos-data:
  zk-data:
  kafka-data:
  es-data:

networks:
  dismai-network:
    driver: bridge
